# SPDX-License-Identifier: AGPL-3.0-or-later
# blob-scale / flow check — blob-drop calibration (DRAFT, UNTESTED)
#
# NOTE: canonical upstream of this file lives in the CeramicaSlicer
# project (corpus/klipper_flow_check.cfg) - if you improve it here,
# consider sending the fix upstream too. This copy works standalone with
# ANY kitchen scale (manual reading entry); pair with
# flow_scale_auto.cfg for the blob-scale hardware's automatic reading.
#
# Per-syringe-load flow calibration + consistency check from the moisture
# research program (docs/moisture-research/consistency-measurement-report.md
# §2, §5; CNC Kitchen blob methodology adapted to a pneumatically fed auger
# extruder). Extrudes blobs with the SAME commanded E at varying rates:
#   - Blob mass at a known-safe rate / commanded E = this load's flow
#     multiplier.
#   - The rate where blobs come out >10% light = the flow ceiling (auger
#     slip / feed starvation) - keep print rates below it.
#   - (multiplier, ceiling) tracked load-to-load = consistency fingerprint.
#
# STATUS: drafted 2026-07-11, never executed on real hardware — the
# synthesis report's §4 trial session is the shakedown. Defaults derive
# from the Clay Vase Mode V4 regime (filament_diameter=5 => E=150mm blob
# ~5.5-5.9g; normal printing ~8mm/s E-rate).
#
# ============================ SETUP (once) ============================
# 1. Include this file from printer.cfg (needs [save_variables], same as
#    klipper_syringe_change.cfg).
# 2. Edit _LDM_FLOW_CFG below. Default geometry is CATCH MODE: the nozzle
#    sits at drop_z (default 100mm) and extrudes straight down into a
#    container on your scale placed underneath - no grid, no XY moves,
#    scale size irrelevant, cleanup = one container back to reclaim.
#    (catch_mode: 0 switches to the older tray-grid-on-the-scale mode;
#    scale/tray dimensions then matter.)
# 3. NOISE vs BLOB SIZE: scale noise is fixed (~0.1-0.2g), so bigger
#    blobs = proportionally less noise. E=150 ~ 5.7g ~ 3.5% noise;
#    E=300 ~ 11.4g ~ 1.8%. For adaptive searches near the threshold,
#    consider blob_e: 250-300.
#
# ================== NORMAL WORKFLOW (adaptive, catch) ==================
#   1. Bed/underside clear -> LDM_FLOW_TUNE   (homes if needed, moves the
#      nozzle to the drop position, then waits)
#   2. Place the scale + container under the nozzle -> LDM_FLOW_PRIME
#      (purges into the container so the line is pressurized)
#   3. TARE the scale -> LDM_FLOW_NEXT        (reference blob at your
#      normal rate = this load's multiplier)
#   4. Wait for the clay to drop, read the scale ->
#      LDM_FLOW_NEXT READING=<running total>
#      It classifies the last blob, picks the next rate (probe last known
#      ceiling -> climb -> bisect), extrudes it. Repeat. It announces and
#      stores the result itself - typically ~4-5 blobs warm.
#   BAD BLOB? (air pocket etc.): LDM_FLOW_REDO READING=<current total>
#      - absorbs the bad blob's mass without classifying and repeats the
#      same rate.
#   LDM_FLOW_STATUS recalls stored results anytime.
#
# Full fixed sweep (trial/diagnostic mode - run this first ever session;
# it verifies the fall-off is clean and monotonic, which the adaptive
# bisection assumes): LDM_FLOW_START then LDM_FLOW_BLOB per blob - every
# blob is operator-triggered, no timers anywhere. Report with
# LDM_FLOW_RESULT READINGS=t1,t2,... (cumulative totals; masses = diffs).
# If a sweep blob goes bad, note its total and enter MASSES= with that
# blob's corrected arithmetic instead of READINGS=.
#
# ============== ONE-TIME: CALIBRATE rotation_distance =================
# Adopted policy (operator decision, 2026-07-11): rotation_distance is
# calibrated ONCE against a known-good load so commanded E means real
# clay volume; after that, per-load drift rides on auto-applied M221 and
# printer.cfg stays machine truth. The one-time procedure:
#   1. On a load that prints well: run a flow check, then
#      LDM_FLOW_SET_BASELINE.
#   2. Measure your wet clay's density (g/cm3) - Keep's syringe method:
#      weigh a marked 50ml syringe full of clay; density = g / 50.
#   3. LDM_FLOW_CAL_ROTATION DENSITY=1.9 CURRENT_RD=<your printer.cfg
#      rotation_distance> -> it prints the corrected rotation_distance.
#   4. Edit printer.cfg to that value, FIRMWARE_RESTART, re-run the flow
#      check + LDM_FLOW_SET_BASELINE (E-units changed, so the old
#      baseline is stale), and set nominal_rotation_distance below to
#      the same value for the record.
#
# ================ PER-LOAD: APPLYING THE CORRECTION ===================
#   - Later loads: the flow result reports the correction vs baseline as
#     an M221 factor (apply_mode "m221", the adopted default; "rotation"
#     exists as an alternative but is not the operating policy).
#   - auto_apply: 1 applies it at result time; either way call
#     _LDM_FLOW_APPLY at the END of PRINT_START so slicer start-gcode
#     resets don't undo it.
#
# ==================== REFILL PROMPT + STALENESS TRACKING ==============
# Every stored flow result now remembers WHICH refill it was measured on
# (ldm_flow_refill). klipper_syringe_change.cfg's SYRINGE_CHANGE macro
# (same directory) uses that: when you log a new load and no print is
# running, it pops an interactive prompt - "Keep it" (LDM_FLOW_KEEP,
# re-stamps the existing numbers as good for this load, marked
# carried-over in the record) or "Rerun" (LDM_FLOW_TUNE). If a print IS
# running or paused, the prompt is skipped - it only ever fires between
# prints. LDM_FLOW_STATUS flags a stored result as STALE if its refill
# number doesn't match the current one. Optional extra layer:
# LDM_FLOW_PRECHECK is a non-blocking staleness note you can call from
# your own PRINT_START (not wired automatically - you add the line).
#
# SAFETY: LDM_FLOW_TUNE and LDM_FLOW_START now refuse to run while
# printer.print_stats.state is "printing" or "paused" - both home and
# drive the toolhead to the drop/park position, which must never happen
# during an active print.
#
# ========================= KLIPPERSCREEN USE ==========================
# No separate computer needed - BOTH modes are fully operable from
# KlipperScreen, and which one to run is operator's choice per session:
#   - ADAPTIVE (LDM_FLOW_TUNE/NEXT/REDO): fastest (~4-5 blobs); enter
#     READING=<total> per blob via the console's on-screen keyboard -
#     comfortable on larger screens.
#   - FIXED SWEEP (LDM_FLOW_START/BLOB/RESULT): one button tap per blob,
#     totals on paper, one entry at the end; also the diagnostic mode
#     that validates the fall-off curve.
# All macros appear as buttons in the Macros panel; key prompts are
# mirrored to the status line via M117; full detail is in the Console
# panel. The Stage 1 connected scale (load cell + HX711) later removes
# number entry entirely - the adaptive search then runs hands-free.
#
# Planned beyond this file (roadmap Track B6): an "LDM flow check" entry
# in the fork's Calibration menu + Moonraker round-trip; Stage 1 = DIY
# connected scale (load cell + HX711, Klipper-native Load_Cell) under the
# catch container -> LDM_FLOW_NEXT reads the mass itself and the whole
# search runs hands-free.

# ------------------- EDIT THIS BLOCK FOR YOUR SETUP -------------------
[gcode_macro _LDM_FLOW_CFG]
description: Flow-check configuration (edit the variables; not called directly).
# Geometry: catch mode (default) drops clay from drop_z into a container
# on the scale placed under the nozzle at platform_x/y.
variable_catch_mode: 1
variable_drop_z: 100           ; mm, nozzle height while extruding (catch)
variable_platform_x: 150       ; where the scale sits / nozzle drops
variable_platform_y: 150
# Tray-grid mode only (catch_mode: 0):
variable_scale_height: 30      ; mm, bed to top of pan
variable_tray_height: 10
variable_tray_size_x: 120      ; usable tray area for the blob grid
variable_tray_size_y: 90
variable_nozzle_gap: 8         ; nozzle above tray while extruding
variable_grid_pitch: 30
variable_park_dx: -80          ; sideways park (tray mode between blobs)
# Sweep/blob defaults:
variable_blob_e: 150           ; mm E per blob (250-300 = less noise)
variable_rate_start: 2         ; mm/s (fixed sweep)
variable_rate_step: 2
variable_count: 8              ; blobs in a fixed sweep
variable_prime_e: 30
# Correction:
variable_auto_apply: 0         ; 1 = apply correction automatically
variable_apply_mode: "m221"    ; adopted policy: m221 ("rotation" = alt)
variable_nominal_rotation_distance: 0  ; set after the one-time cal (record)
variable_virtual_filament_diameter: 5  ; slicer's filament_diameter, mm
gcode:
    RESPOND MSG="_LDM_FLOW_CFG holds settings only; run LDM_FLOW_TUNE (adaptive) or LDM_FLOW_START (sweep)."
# ----------------------------------------------------------------------

[gcode_macro _LDM_FLOW_GOTO_BLOB]
description: Internal: move to the extrusion position for blob slot IDX.
gcode:
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set svv = printer.save_variables.variables %}
    {% set idx = params.IDX|default(0)|int %}
    G90
    {% if cfg.catch_mode|int == 1 %}
        G1 Z{cfg.drop_z} F3000
        G1 X{cfg.platform_x} Y{cfg.platform_y} F6000
    {% else %}
        {% set pitch = svv.ldm_flow_pitch|default(cfg.grid_pitch)|float %}
        {% set cols  = svv.ldm_flow_cols|default(4)|int %}
        {% set rows_total = svv.ldm_flow_count|default(8)|int %}
        {% set ez = svv.ldm_flow_extrude_z|float %}
        {% set cz = svv.ldm_flow_clear_z|float %}
        {% set gx = cfg.platform_x + pitch * ((idx % cols) - (cols - 1) / 2) %}
        {% set gy = cfg.platform_y + pitch * ((idx // cols) - ((rows_total - 1) // cols) / 2) %}
        G1 Z{cz} F3000
        G1 X{gx} Y{gy} F6000
        G1 Z{ez} F3000
    {% endif %}

[gcode_macro _LDM_FLOW_PARK]
description: Internal: park clear of the scale (tray mode); no-op hold in catch mode.
gcode:
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set svv = printer.save_variables.variables %}
    {% if cfg.catch_mode|int != 1 %}
        {% set cz = svv.ldm_flow_clear_z|float %}
        G90
        G1 Z{cz} F3000
        G1 X{cfg.platform_x + cfg.park_dx} Y{cfg.platform_y} F6000
    {% endif %}

[gcode_macro LDM_FLOW_PRIME]
description: Purge PRIME_E (default from _LDM_FLOW_CFG) so the line is pressurized before the first measured blob. Catch mode: run AFTER placing the container - the purge drops into it; tare afterward. Tray mode: run BEFORE placing the scale - purges at the park spot on the bare bed.
gcode:
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set prime_e = params.PRIME_E|default(cfg.prime_e)|float %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        { action_raise_error("Home first (or run LDM_FLOW_TUNE / LDM_FLOW_START, which home).") }
    {% endif %}
    G90
    {% if cfg.catch_mode|int == 1 %}
        G1 Z{cfg.drop_z} F3000
        G1 X{cfg.platform_x} Y{cfg.platform_y} F6000
    {% else %}
        G1 Z30 F3000
        G1 X{cfg.platform_x + cfg.park_dx} Y{cfg.platform_y} F6000
    {% endif %}
    M83
    G1 E{prime_e} F{8 * 60}
    G4 P2000
    RESPOND MSG="Primed ({prime_e}mm E). {'TARE the scale, then LDM_FLOW_NEXT (adaptive) or LDM_FLOW_BLOB (sweep).' if cfg.catch_mode|int == 1 else 'Place the scale + tared tray, then LDM_FLOW_BLOB / LDM_FLOW_NEXT.'}"
    M117 {'Tare scale, then NEXT/BLOB' if cfg.catch_mode|int == 1 else 'Place scale, then BLOB/NEXT'}

# ========================= ADAPTIVE SEARCH ============================

[gcode_macro LDM_FLOW_TUNE]
description: Arm the adaptive flow search (bracket-and-bisect from the last known ceiling; ~4-5 blobs warm). Homes if needed and positions for the first blob. Params override _LDM_FLOW_CFG: BLOB_E, REF_RATE (known-safe rate, default 8), RESOLUTION (mm/s bracket width to stop at, default 1), MAX_RATE (cap, default 30), MAX_BLOBS (default 10).
gcode:
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set svv = printer.save_variables.variables %}
    {% set ps = printer.print_stats.state|default("standby") %}
    {% if ps in ["printing", "paused"] %}
        { action_raise_error("A print is %s - the flow search homes and drives the toolhead, which must not happen mid-print. Wait until it finishes." % ps) }
    {% endif %}
    {% set blob_e    = params.BLOB_E|default(cfg.blob_e)|float %}
    {% set ref_rate  = params.REF_RATE|default(8)|float %}
    {% set res       = params.RESOLUTION|default(1)|float %}
    {% set max_rate  = params.MAX_RATE|default(30)|float %}
    {% set max_blobs = params.MAX_BLOBS|default(10)|int %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        RESPOND MSG="Homing first - machine must be clear."
        G28
    {% endif %}
    {% if cfg.catch_mode|int != 1 %}
        ; tray mode still needs grid bookkeeping
        {% set cols = ((cfg.tray_size_x - 25) / cfg.grid_pitch)|int + 1 %}
        SAVE_VARIABLE VARIABLE=ldm_flow_pitch VALUE={cfg.grid_pitch}
        SAVE_VARIABLE VARIABLE=ldm_flow_cols VALUE={[cols, max_blobs]|min}
        SAVE_VARIABLE VARIABLE=ldm_flow_count VALUE={max_blobs}
        {% set ez = cfg.scale_height + cfg.tray_height + cfg.nozzle_gap %}
        SAVE_VARIABLE VARIABLE=ldm_flow_extrude_z VALUE={ez}
        SAVE_VARIABLE VARIABLE=ldm_flow_clear_z VALUE={ez + 40}
    {% endif %}
    {% set seed = svv.ldm_flow_baseline_ceiling|default(svv.ldm_flow_ceiling_rate|default(0))|float %}
    SAVE_VARIABLE VARIABLE=ldm_flow_blob_e VALUE={blob_e}
    SAVE_VARIABLE VARIABLE=ldm_tune_ref_rate VALUE={ref_rate}
    SAVE_VARIABLE VARIABLE=ldm_tune_res VALUE={res}
    SAVE_VARIABLE VARIABLE=ldm_tune_max_rate VALUE={max_rate}
    SAVE_VARIABLE VARIABLE=ldm_tune_max_blobs VALUE={max_blobs}
    SAVE_VARIABLE VARIABLE=ldm_tune_seed VALUE={seed}
    SAVE_VARIABLE VARIABLE=ldm_tune_low VALUE=0
    SAVE_VARIABLE VARIABLE=ldm_tune_high VALUE=0
    SAVE_VARIABLE VARIABLE=ldm_tune_pending_rate VALUE=0
    SAVE_VARIABLE VARIABLE=ldm_tune_pending_type VALUE="none"
    SAVE_VARIABLE VARIABLE=ldm_tune_ref_mass VALUE=0
    SAVE_VARIABLE VARIABLE=ldm_tune_prev_total VALUE=0
    SAVE_VARIABLE VARIABLE=ldm_tune_blobs_used VALUE=0
    SAVE_VARIABLE VARIABLE=ldm_tune_done VALUE=0
    _LDM_FLOW_GOTO_BLOB IDX=0
    RESPOND MSG="Adaptive search armed (seed ceiling: {'%.1f mm/s' % seed if seed > 0 else 'none - cold start'}). {'Place the scale + container under the nozzle, then LDM_FLOW_PRIME, tare, then LDM_FLOW_NEXT.' if cfg.catch_mode|int == 1 else 'Run LDM_FLOW_PRIME, place the scale + tared tray, then LDM_FLOW_NEXT.'}"
    M117 Search armed - place scale, then PRIME

[gcode_macro LDM_FLOW_NEXT]
description: Drive the adaptive search. First call (after prime + tare): extrudes the reference blob. Every later call: READING=<the scale's running total> - classifies the last blob, picks the next rate, extrudes it; announces + stores the result when converged.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% if svv.ldm_tune_pending_type is not defined %}
        { action_raise_error("No adaptive search armed. Run LDM_FLOW_TUNE first.") }
    {% endif %}
    {% if svv.ldm_tune_done|default(0)|int == 1 %}
        RESPOND MSG="Search finished - see LDM_FLOW_STATUS. Re-arm with LDM_FLOW_TUNE."
    {% else %}
    {% set blob_e    = svv.ldm_flow_blob_e|float %}
    {% set ref_rate  = svv.ldm_tune_ref_rate|float %}
    {% set res       = svv.ldm_tune_res|float %}
    {% set max_rate  = svv.ldm_tune_max_rate|float %}
    {% set max_blobs = svv.ldm_tune_max_blobs|int %}
    {% set seed      = svv.ldm_tune_seed|float %}
    {% set used      = svv.ldm_tune_blobs_used|int %}
    {% set ns = namespace(low=svv.ldm_tune_low|float, high=svv.ldm_tune_high|float,
                          ptype=svv.ldm_tune_pending_type, prate=svv.ldm_tune_pending_rate|float,
                          ref_mass=svv.ldm_tune_ref_mass|float, prev=svv.ldm_tune_prev_total|float,
                          next_rate=0, next_type="search", finished=False) %}
    ; ---- ingest the reading for the pending blob (if any) ----
    {% if ns.ptype != "none" %}
        {% if params.READING is not defined %}
            { action_raise_error("Enter the running total: LDM_FLOW_NEXT READING=<grams> (or LDM_FLOW_REDO READING=... if the last blob was bad)") }
        {% endif %}
        {% set total = params.READING|float %}
        {% set mass = total - ns.prev %}
        {% set ns.prev = total %}
        {% if ns.ptype == "ref" %}
            {% set ns.ref_mass = mass %}
            {% set ns.low = ref_rate %}
            SAVE_VARIABLE VARIABLE=ldm_flow_g_per_e VALUE={(mass / blob_e)|round(5)}
            SAVE_VARIABLE VARIABLE=ldm_flow_reference_g VALUE={mass|round(2)}
            SAVE_VARIABLE VARIABLE=ldm_flow_refill VALUE={svv.ldm_refill_count|default(0)}
            SAVE_VARIABLE VARIABLE=ldm_flow_carried_over VALUE=0
            RESPOND MSG="Reference blob: {mass|round(2)}g at {ref_rate} mm/s -> {(mass / blob_e)|round(5)} g per E-mm."
        {% else %}
            {% if mass >= 0.9 * ns.ref_mass %}
                {% set ns.low = [ns.low, ns.prate]|max %}
                RESPOND MSG="Blob at {ns.prate} mm/s: PASS ({mass|round(2)}g). Bracket: pass<={ns.low}, fail>={'%.1f' % ns.high if ns.high > 0 else '?'}."
            {% else %}
                {% set ns.high = ns.prate if ns.high == 0 else [ns.high, ns.prate]|min %}
                RESPOND MSG="Blob at {ns.prate} mm/s: FAIL ({mass|round(2)}g vs ref {ns.ref_mass|round(2)}g). Bracket: pass<={ns.low}, fail>={ns.high}."
            {% endif %}
        {% endif %}
    {% endif %}
    ; ---- decide next rate, or finish ----
    {% if ns.ptype == "none" %}
        {% set ns.next_rate = ref_rate %}
        {% set ns.next_type = "ref" %}
    {% elif ns.high > 0 and (ns.high - ns.low) <= res %}
        {% set ns.finished = True %}
    {% elif used >= max_blobs %}
        {% set ns.finished = True %}
        RESPOND MSG="Blob budget ({max_blobs}) reached - reporting the bracket as-is."
    {% elif ns.high == 0 %}
        {% if ns.ptype == "ref" and seed > ns.low %}
            {% set ns.next_rate = seed %}
        {% else %}
            {% set ns.next_rate = [[ns.low * 1.4, ns.low + 2]|max, max_rate]|min %}
        {% endif %}
    {% else %}
        {% set ns.next_rate = ((ns.low + ns.high) / 2)|round(1) %}
    {% endif %}
    {% if ns.finished %}
        SAVE_VARIABLE VARIABLE=ldm_flow_ceiling_rate VALUE={ns.low}
        SAVE_VARIABLE VARIABLE=ldm_tune_done VALUE=1
        SAVE_VARIABLE VARIABLE=ldm_tune_pending_type VALUE="none"
        RESPOND MSG="ADAPTIVE SEARCH DONE in {used} blobs: ceiling {ns.low} mm/s (first fail {'%.1f' % ns.high if ns.high > 0 else 'not reached'}), multiplier {svv.ldm_flow_g_per_e|default('?')} g per E-mm. Stored."
        M117 Flow cal DONE - ceiling {ns.low} mm/s
        {% if svv.ldm_flow_baseline_g_per_e is defined and svv.ldm_flow_g_per_e is defined and cfg.auto_apply|int == 1 %}
            _LDM_FLOW_APPLY
        {% elif svv.ldm_flow_baseline_g_per_e is defined and svv.ldm_flow_g_per_e is defined %}
            RESPOND MSG="Suggested correction vs baseline: run _LDM_FLOW_APPLY (or set auto_apply: 1)."
        {% endif %}
    {% else %}
        _LDM_FLOW_GOTO_BLOB IDX={used}
        RESPOND MSG="Blob {used + 1}: E={blob_e}mm at {ns.next_rate} mm/s..."
        M83
        G1 E{blob_e} F{(ns.next_rate * 60)|int}
        _LDM_FLOW_PARK
        SAVE_VARIABLE VARIABLE=ldm_tune_pending_rate VALUE={ns.next_rate}
        SAVE_VARIABLE VARIABLE=ldm_tune_pending_type VALUE="{ns.next_type}"
        SAVE_VARIABLE VARIABLE=ldm_tune_low VALUE={ns.low}
        SAVE_VARIABLE VARIABLE=ldm_tune_high VALUE={ns.high}
        SAVE_VARIABLE VARIABLE=ldm_tune_ref_mass VALUE={ns.ref_mass}
        SAVE_VARIABLE VARIABLE=ldm_tune_prev_total VALUE={ns.prev}
        SAVE_VARIABLE VARIABLE=ldm_tune_blobs_used VALUE={used + 1}
        RESPOND MSG="Wait for the drop, read the scale, then: LDM_FLOW_NEXT READING=<running total>"
        M117 Read scale -> NEXT READING=
    {% endif %}
    {% endif %}

[gcode_macro LDM_FLOW_REDO]
description: The last adaptive blob was bad (air pocket, tear-off, misread). Give READING=<current running total INCLUDING the bad blob> - its mass is absorbed without classification and the same rate is extruded again.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% if svv.ldm_tune_pending_type is not defined or svv.ldm_tune_pending_type == "none" %}
        { action_raise_error("Nothing to redo - no adaptive blob is pending.") }
    {% endif %}
    {% if params.READING is not defined %}
        { action_raise_error("Give the current total (bad blob included): LDM_FLOW_REDO READING=<grams>") }
    {% endif %}
    {% set used   = svv.ldm_tune_blobs_used|int %}
    {% set blob_e = svv.ldm_flow_blob_e|float %}
    {% set rate   = svv.ldm_tune_pending_rate|float %}
    SAVE_VARIABLE VARIABLE=ldm_tune_prev_total VALUE={params.READING|float}
    _LDM_FLOW_GOTO_BLOB IDX={used}
    RESPOND MSG="Redo at {rate} mm/s (bad blob's mass absorbed, not classified)..."
    M83
    G1 E{blob_e} F{(rate * 60)|int}
    _LDM_FLOW_PARK
    SAVE_VARIABLE VARIABLE=ldm_tune_blobs_used VALUE={used + 1}
    RESPOND MSG="Wait for the drop, read the scale, then: LDM_FLOW_NEXT READING=<running total>"
    M117 Redo done - read scale -> NEXT READING=

# ===================== FIXED SWEEP (trial/diagnostic) =================

[gcode_macro LDM_FLOW_START]
description: Arm a self-paced FIXED sweep (the trial/diagnostic mode - verifies the fall-off is monotonic). Homes if needed and positions. Then LDM_FLOW_PRIME, place/tare per mode, and LDM_FLOW_BLOB once per blob. Params override _LDM_FLOW_CFG: BLOB_E, RATE_START, RATE_STEP, COUNT, GRID_PITCH.
gcode:
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set ps = printer.print_stats.state|default("standby") %}
    {% if ps in ["printing", "paused"] %}
        { action_raise_error("A print is %s - the sweep homes and drives the toolhead, which must not happen mid-print. Wait until it finishes." % ps) }
    {% endif %}
    {% set blob_e     = params.BLOB_E|default(cfg.blob_e)|float %}
    {% set rate_start = params.RATE_START|default(cfg.rate_start)|float %}
    {% set rate_step  = params.RATE_STEP|default(cfg.rate_step)|float %}
    {% set count      = params.COUNT|default(cfg.count)|int %}
    {% set pitch      = params.GRID_PITCH|default(cfg.grid_pitch)|float %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        RESPOND MSG="Homing first - machine must be clear."
        G28
    {% endif %}
    {% if cfg.catch_mode|int != 1 %}
        {% set cols = ((cfg.tray_size_x - 25) / pitch)|int + 1 %}
        {% set cols = [cols, count]|min %}
        {% set rows = ((count - 1) // cols) + 1 %}
        {% if (rows - 1) * pitch + 25 > cfg.tray_size_y %}
            { action_raise_error("Grid doesn't fit the tray - reduce COUNT/GRID_PITCH or update _LDM_FLOW_CFG.") }
        {% endif %}
        {% set ez = cfg.scale_height + cfg.tray_height + cfg.nozzle_gap %}
        SAVE_VARIABLE VARIABLE=ldm_flow_pitch VALUE={pitch}
        SAVE_VARIABLE VARIABLE=ldm_flow_cols VALUE={cols}
        SAVE_VARIABLE VARIABLE=ldm_flow_extrude_z VALUE={ez}
        SAVE_VARIABLE VARIABLE=ldm_flow_clear_z VALUE={ez + 40}
    {% endif %}
    SAVE_VARIABLE VARIABLE=ldm_flow_blob_e VALUE={blob_e}
    SAVE_VARIABLE VARIABLE=ldm_flow_rate_start VALUE={rate_start}
    SAVE_VARIABLE VARIABLE=ldm_flow_rate_step VALUE={rate_step}
    SAVE_VARIABLE VARIABLE=ldm_flow_count VALUE={count}
    SAVE_VARIABLE VARIABLE=ldm_flow_step_idx VALUE=0
    _LDM_FLOW_GOTO_BLOB IDX=0
    RESPOND MSG="Sweep armed: {count} blobs of E={blob_e}mm at {rate_start}..{rate_start + rate_step * (count - 1)} mm/s. {'Place scale + container under the nozzle, LDM_FLOW_PRIME, tare, then LDM_FLOW_BLOB.' if cfg.catch_mode|int == 1 else 'LDM_FLOW_PRIME, place scale + tared tray, then LDM_FLOW_BLOB.'}"

[gcode_macro LDM_FLOW_BLOB]
description: Extrude the next blob of the armed sweep, then hold/park. Record the scale's running total between calls; after the last blob report with LDM_FLOW_RESULT READINGS=...
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% if svv.ldm_flow_step_idx is not defined or svv.ldm_flow_count is not defined %}
        { action_raise_error("No sweep armed. Run LDM_FLOW_START first.") }
    {% endif %}
    {% set idx    = svv.ldm_flow_step_idx|int %}
    {% set count  = svv.ldm_flow_count|int %}
    {% set blob_e = svv.ldm_flow_blob_e|float %}
    {% set rate   = svv.ldm_flow_rate_start|float + svv.ldm_flow_rate_step|float * idx %}
    {% if idx >= count %}
        RESPOND MSG="Sweep complete ({count} blobs). Report: LDM_FLOW_RESULT READINGS=t1,t2,..."
    {% else %}
        _LDM_FLOW_GOTO_BLOB IDX={idx}
        RESPOND MSG="Blob {idx + 1}/{count}: E={blob_e}mm at {rate} mm/s..."
        M83
        G1 E{blob_e} F{(rate * 60)|int}
        _LDM_FLOW_PARK
        SAVE_VARIABLE VARIABLE=ldm_flow_step_idx VALUE={idx + 1}
        {% if idx + 1 >= count %}
            RESPOND MSG="Blob {idx + 1}/{count} done - the last one. Record the final total, then: LDM_FLOW_RESULT READINGS=..."
            M117 Last blob - enter RESULT READINGS=
        {% else %}
            RESPOND MSG="Blob {idx + 1}/{count} done ({rate} mm/s). Record the running total, then LDM_FLOW_BLOB."
            M117 Blob {idx + 1}/{count} - record, then BLOB
        {% endif %}
    {% endif %}

# ==================== RESULTS, BASELINE, CORRECTION ===================

[gcode_macro LDM_FLOW_CAL_ROTATION]
description: ONE-TIME calibration helper (see header): computes the printer.cfg rotation_distance that makes commanded E correspond to real clay volume, from the stored BASELINE flow result and your measured wet-clay density. Params: DENSITY (g/cm3, e.g. 1.9 - measure via a 50ml syringe on the scale), CURRENT_RD (the rotation_distance currently in printer.cfg). Prints the value; apply it by editing printer.cfg + FIRMWARE_RESTART, then RE-RUN the flow check and LDM_FLOW_SET_BASELINE (E-units change).
gcode:
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set svv = printer.save_variables.variables %}
    {% if params.DENSITY is not defined or params.CURRENT_RD is not defined %}
        { action_raise_error("Usage: LDM_FLOW_CAL_ROTATION DENSITY=<g/cm3> CURRENT_RD=<printer.cfg rotation_distance>") }
    {% endif %}
    {% if svv.ldm_flow_baseline_g_per_e is not defined %}
        { action_raise_error("No baseline stored. Run a flow check on a known-good load + LDM_FLOW_SET_BASELINE first.") }
    {% endif %}
    {% set density   = params.DENSITY|float %}
    {% set rd        = params.CURRENT_RD|float %}
    {% set d         = cfg.virtual_filament_diameter|float %}
    ; expected mass per E-mm if E meant true volume: area(mm2) x 1mm x density
    {% set expected  = 3.14159265 / 4 * d * d * density / 1000 %}
    {% set measured  = svv.ldm_flow_baseline_g_per_e|float %}
    {% set new_rd    = (rd * measured / expected)|round(4) %}
    RESPOND MSG="Rotation calibration: measured {measured} g/E-mm vs expected {expected|round(5)} (d={d}mm, density={density}). Suggested rotation_distance: {new_rd} (currently {rd})."
    RESPOND MSG="To apply: set rotation_distance: {new_rd} in printer.cfg, FIRMWARE_RESTART, re-run a flow check on this load, LDM_FLOW_SET_BASELINE again, and set nominal_rotation_distance: {new_rd} in _LDM_FLOW_CFG."
    M117 Suggested rot_dist: {new_rd}

[gcode_macro LDM_FLOW_RESULT]
description: Analyze and store a fixed sweep. EITHER READINGS=t1,t2,... (cumulative running totals; masses = differences) OR MASSES=m1,m2,... Reference = mean of first two blobs; ceiling = first blob below 90% of reference. Reports the correction vs baseline (applies it with auto_apply: 1).
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% set readings_raw = params.READINGS|default("")|string %}
    {% set masses_raw   = params.MASSES|default("")|string %}
    {% if not readings_raw and not masses_raw %}
        { action_raise_error("Provide READINGS=t1,t2,... (running totals) or MASSES=m1,m2,...") }
    {% endif %}
    {% set blob_e     = svv.ldm_flow_blob_e|default(150)|float %}
    {% set rate_start = svv.ldm_flow_rate_start|default(2)|float %}
    {% set rate_step  = svv.ldm_flow_rate_step|default(2)|float %}
    {% set ns = namespace(masses=[], prev=0.0, ceiling_rate=0, ceiling_found=False) %}
    {% if readings_raw %}
        {% for t in readings_raw.split(',') %}
            {% set ns.masses = ns.masses + [t|float - ns.prev] %}
            {% set ns.prev = t|float %}
        {% endfor %}
    {% else %}
        {% for m in masses_raw.split(',') %}
            {% set ns.masses = ns.masses + [m|float] %}
        {% endfor %}
    {% endif %}
    {% if ns.masses|length < 2 %}
        { action_raise_error("Need at least 2 blobs (got " ~ ns.masses|length ~ ").") }
    {% endif %}
    {% set reference = (ns.masses[0] + ns.masses[1]) / 2 %}
    {% for m in ns.masses %}
        {% if not ns.ceiling_found and m < 0.9 * reference %}
            {% set ns.ceiling_rate = rate_start + rate_step * loop.index0 %}
            {% set ns.ceiling_found = True %}
        {% endif %}
    {% endfor %}
    {% set g_per_e = reference / blob_e %}
    SAVE_VARIABLE VARIABLE=ldm_flow_g_per_e VALUE={g_per_e|round(5)}
    SAVE_VARIABLE VARIABLE=ldm_flow_reference_g VALUE={reference|round(2)}
    SAVE_VARIABLE VARIABLE=ldm_flow_refill VALUE={svv.ldm_refill_count|default(0)}
    SAVE_VARIABLE VARIABLE=ldm_flow_carried_over VALUE=0
    {% if ns.ceiling_found %}
        SAVE_VARIABLE VARIABLE=ldm_flow_ceiling_rate VALUE={ns.ceiling_rate}
        RESPOND MSG="Flow result: {g_per_e|round(4)} g per E-mm (ref {reference|round(2)}g). CEILING at {ns.ceiling_rate} mm/s."
    {% else %}
        SAVE_VARIABLE VARIABLE=ldm_flow_ceiling_rate VALUE=0
        RESPOND MSG="Flow result: {g_per_e|round(4)} g per E-mm (ref {reference|round(2)}g). No ceiling in the swept range."
    {% endif %}
    {% if svv.ldm_flow_baseline_g_per_e is defined %}
        {% if cfg.auto_apply|int == 1 %}
            _LDM_FLOW_APPLY
        {% else %}
            RESPOND MSG="Baseline set - run _LDM_FLOW_APPLY to apply the correction (or set auto_apply: 1)."
        {% endif %}
    {% else %}
        RESPOND MSG="No baseline yet. On a load that prints well: LDM_FLOW_SET_BASELINE."
    {% endif %}

[gcode_macro LDM_FLOW_SET_BASELINE]
description: Store the most recent flow result as the known-good baseline future loads are corrected against. Run on a load that prints well.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.ldm_flow_g_per_e is not defined %}
        { action_raise_error("No flow result stored yet. Run a check first.") }
    {% endif %}
    SAVE_VARIABLE VARIABLE=ldm_flow_baseline_g_per_e VALUE={svv.ldm_flow_g_per_e}
    SAVE_VARIABLE VARIABLE=ldm_flow_baseline_ceiling VALUE={svv.ldm_flow_ceiling_rate|default(0)}
    RESPOND MSG="Baseline set: {svv.ldm_flow_g_per_e} g per E-mm, ceiling {svv.ldm_flow_ceiling_rate|default(0)} mm/s."

[gcode_macro _LDM_FLOW_APPLY]
description: Apply the stored correction (baseline vs latest result) per _LDM_FLOW_CFG apply_mode: "m221" (gcode flow %) or "rotation" (runtime SET_EXTRUDER_ROTATION_DISTANCE; needs nominal_rotation_distance). Call at the END of PRINT_START so slicer resets don't undo it.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _LDM_FLOW_CFG"] %}
    {% if svv.ldm_flow_baseline_g_per_e is defined and svv.ldm_flow_g_per_e is defined and svv.ldm_flow_g_per_e|float > 0 %}
        {% if cfg.apply_mode == "rotation" %}
            {% if cfg.nominal_rotation_distance|float <= 0 %}
                RESPOND MSG="apply_mode rotation needs nominal_rotation_distance set in _LDM_FLOW_CFG - falling back to M221."
                {% set factor = (svv.ldm_flow_baseline_g_per_e|float / svv.ldm_flow_g_per_e|float * 100)|round(1) %}
                M221 S{factor}
                RESPOND MSG="LDM flow correction applied: M221 S{factor}."
            {% else %}
                ; light load (measured < baseline) -> smaller rotation_distance -> more clay per E-mm
                {% set new_rd = (cfg.nominal_rotation_distance|float * svv.ldm_flow_g_per_e|float / svv.ldm_flow_baseline_g_per_e|float)|round(4) %}
                SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder ROTATION_DISTANCE={new_rd}
                RESPOND MSG="LDM flow correction applied: rotation_distance {new_rd} (nominal {cfg.nominal_rotation_distance}; resets to printer.cfg on restart)."
            {% endif %}
        {% else %}
            {% set factor = (svv.ldm_flow_baseline_g_per_e|float / svv.ldm_flow_g_per_e|float * 100)|round(1) %}
            M221 S{factor}
            RESPOND MSG="LDM flow correction applied: M221 S{factor} (load {svv.ldm_flow_g_per_e} vs baseline {svv.ldm_flow_baseline_g_per_e} g/E-mm)."
        {% endif %}
    {% else %}
        RESPOND MSG="LDM flow correction skipped: no baseline and/or no flow result stored."
    {% endif %}

[gcode_macro LDM_FLOW_KEEP]
description: Explicit operator choice (from the SYRINGE_CHANGE prompt, or called directly) - confirms the existing calibration is good for the current load without re-measuring. Re-stamps it as valid for the current refill (so LDM_FLOW_STATUS/PRECHECK stop flagging it stale) and marks it carried-over for the record.
gcode:
    {% set svv = printer.save_variables.variables %}
    RESPOND TYPE=command MSG="action:prompt_end"
    {% if svv.ldm_flow_g_per_e is not defined %}
        RESPOND MSG="Nothing to keep - no flow calibration on record. Run LDM_FLOW_TUNE."
        M117 No calibration on record - run TUNE
    {% else %}
        SAVE_VARIABLE VARIABLE=ldm_flow_refill VALUE={svv.ldm_refill_count|default(0)}
        SAVE_VARIABLE VARIABLE=ldm_flow_carried_over VALUE=1
        RESPOND MSG="Keeping existing calibration for refill #{svv.ldm_refill_count|default('?')}: {svv.ldm_flow_g_per_e} g per E-mm, ceiling {svv.ldm_flow_ceiling_rate|default(0)} mm/s. (Operator judgment call, not re-measured - noted in the record.)"
        M117 Calibration kept for this load
    {% endif %}

[gcode_macro LDM_FLOW_STATUS]
description: Report the stored flow fingerprint, its refill provenance, and the baseline.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.ldm_flow_g_per_e is not defined %}
        RESPOND MSG="No flow check stored yet. LDM_FLOW_TUNE (adaptive) or LDM_FLOW_START (sweep)."
    {% else %}
        {% set ceiling     = svv.ldm_flow_ceiling_rate|default(0)|float %}
        {% set from_refill = svv.ldm_flow_refill|default(-1)|int %}
        {% set cur_refill  = svv.ldm_refill_count|default(0)|int %}
        {% set carried     = svv.ldm_flow_carried_over|default(0)|int == 1 %}
        RESPOND MSG="Last flow check: {svv.ldm_flow_g_per_e} g per E-mm, reference blob {svv.ldm_flow_reference_g}g, ceiling {'%s mm/s' % ceiling if ceiling > 0 else 'not reached'} - from refill #{from_refill}{' (carried over, not re-measured)' if carried else ''}."
        {% if from_refill != cur_refill %}
            RESPOND MSG="STALE: current load is refill #{cur_refill} - this calibration is from an earlier refill. Run LDM_FLOW_TUNE, or LDM_FLOW_KEEP to confirm it's still good."
            M117 Flow cal STALE (from refill #{from_refill})
        {% endif %}
        {% if svv.ldm_flow_baseline_g_per_e is defined %}
            RESPOND MSG="Baseline: {svv.ldm_flow_baseline_g_per_e} g per E-mm (ceiling {svv.ldm_flow_baseline_ceiling|default(0)})."
        {% endif %}
    {% endif %}

[gcode_macro LDM_FLOW_PRECHECK]
description: Non-blocking staleness note - wire this into the END of YOUR OWN PRINT_START (not automatic) if you want a warning before every print without a popup. Never pauses or prompts; printing continues either way.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cur_refill  = svv.ldm_refill_count|default(0)|int %}
    {% set from_refill = svv.ldm_flow_refill|default(-1)|int %}
    {% if svv.ldm_flow_g_per_e is not defined %}
        RESPOND MSG="LDM flow precheck: no calibration on record at all (refill #{cur_refill})."
        M117 No flow calibration on record
    {% elif from_refill != cur_refill %}
        RESPOND MSG="LDM flow precheck: calibration is from refill #{from_refill}, current load is refill #{cur_refill} - printing with a stale fingerprint."
        M117 Flow cal stale (refill #{from_refill})
    {% endif %}
