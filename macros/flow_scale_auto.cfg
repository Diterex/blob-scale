# blob-scale / automatic reading layer (EXPERIMENTAL SKETCH - UNTESTED)
#
# Turns the manual flow-check into a hands-free loop: instead of the
# operator typing LDM_FLOW_NEXT READING=<grams>, a delayed_gcode chain
# reads the load cell itself, feeds the value in, waits for the next
# blob to finish and settle, and repeats until the adaptive search
# converges.
#
# Requires: flow_check.cfg (same directory) + a calibrated [load_cell]
# (see docs/klipper-setup.md).
#
# >>> THE ONE LINE YOU MUST VERIFY <<<
# The Jinja expression that reads "current grams" from Klipper's
# load_cell object is marked VERIFY below. Klipper's load-cell status
# fields have evolved between releases - check
# https://www.klipper3d.org/Status_Reference.html for your version and
# fix the field name if needed. Everything else is standard macro
# plumbing.
#
# Usage:
#   1. LDM_FLOW_TUNE            ; arm the adaptive search as usual
#   2. place container, LDM_FLOW_PRIME, then LOAD_CELL_TARE
#   3. LDM_FLOW_AUTO            ; walk away - M117 announces the result
#   LDM_FLOW_AUTO_STOP aborts the chain at any point.

[gcode_macro _FLOW_AUTO_CFG]
description: Auto-loop settings (edit; not called directly).
variable_settle_s: 12          ; seconds after extrusion ends before reading
                               ; (blob must detach, drop, and the cell settle)
gcode:
    RESPOND MSG="_FLOW_AUTO_CFG holds settings only."

[gcode_macro LDM_FLOW_AUTO]
description: Run the armed adaptive search hands-free, reading the blob-scale load cell between blobs. Arm with LDM_FLOW_TUNE + LDM_FLOW_PRIME + LOAD_CELL_TARE first.
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.ldm_tune_pending_type is not defined %}
        { action_raise_error("Arm first: LDM_FLOW_TUNE, place container, LDM_FLOW_PRIME, LOAD_CELL_TARE - then LDM_FLOW_AUTO.") }
    {% endif %}
    RESPOND MSG="Hands-free flow search starting. LDM_FLOW_AUTO_STOP aborts."
    M117 Auto flow search running...
    UPDATE_DELAYED_GCODE ID=_flow_auto_step DURATION=1

[gcode_macro LDM_FLOW_AUTO_STOP]
description: Abort the hands-free loop (the search state itself survives; continue manually with LDM_FLOW_NEXT if you want).
gcode:
    UPDATE_DELAYED_GCODE ID=_flow_auto_step DURATION=0
    RESPOND MSG="Auto loop stopped."
    M117 Auto flow search stopped

[delayed_gcode _flow_auto_step]
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set auto = printer["gcode_macro _FLOW_AUTO_CFG"] %}
    {% if svv.ldm_tune_done|default(0)|int == 1 %}
        RESPOND MSG="Auto loop: search finished - see LDM_FLOW_STATUS."
        M117 Flow cal DONE
        UPDATE_DELAYED_GCODE ID=_flow_auto_step DURATION=0
    {% else %}
        ; ---- read the scale ----
        ; VERIFY THIS FIELD NAME against your Klipper version's
        ; Status_Reference (load_cell section). Candidates seen in the
        ; wild: .force_g / .grams / .weight
        {% set grams = printer["load_cell"].force_g|default(0)|round(2) %}
        RESPOND MSG="Auto loop: scale reads {grams}g."
        LDM_FLOW_NEXT READING={grams}
        ; ---- schedule the next read: extrusion time + settle ----
        {% set blob_e = svv.ldm_flow_blob_e|default(150)|float %}
        {% set rate   = svv.ldm_tune_pending_rate|default(8)|float %}
        {% set wait   = (blob_e / [rate, 0.5]|max + auto.settle_s)|round(0)|int %}
        UPDATE_DELAYED_GCODE ID=_flow_auto_step DURATION={[wait, 5]|max}
    {% endif %}
